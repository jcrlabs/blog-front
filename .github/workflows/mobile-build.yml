name: Mobile Build

on:
  workflow_dispatch:
    inputs:
      platform:
        description: 'Platform to build'
        required: true
        default: 'android'
        type: choice
        options:
          - android
          - both

jobs:
  android-apk:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install dependencies
        run: npm ci

      - name: Create webDir (required by Capacitor, content served from server.url)
        run: mkdir -p out && echo '<!DOCTYPE html><html><body></body></html>' > out/index.html

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: jcrlabs-blog-debug.apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

  ios-build:
    name: Build iOS
    if: inputs.platform == 'both'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Create webDir (required by Capacitor, content served from server.url)
        run: mkdir -p out && echo '<!DOCTYPE html><html><body></body></html>' > out/index.html

      - name: Sync Capacitor
        run: npx cap sync ios

      - name: Build iOS (unsigned)
        working-directory: ios/App
        run: |
          xcodebuild -workspace App.xcworkspace \
            -scheme App \
            -configuration Debug \
            -destination 'generic/platform=iOS Simulator' \
            -derivedDataPath ./build \
            CODE_SIGNING_ALLOWED=NO

      - name: Upload iOS build artifact
        uses: actions/upload-artifact@v4
        with:
          name: jcrlabs-blog-ios-debug
          path: ios/App/build/Build/Products/Debug-iphonesimulator/App.app
          retention-days: 30
